name: Scope Isolation Check

on:
  pull_request:
    branches: [master, main, "002-server-spec"]
  push:
    branches: [master, main, "002-server-spec"]

jobs:
  check-scope-isolation:
    name: Check Single Scope Per Commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Scope Isolation
        shell: bash
        run: |
          echo "🔍 检查每个提交的范围隔离..."

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            BASE_SHA=$(git rev-parse origin/${{ github.base_ref }})
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
          fi

          detect_scope() {
            local file="$1"
            case "$file" in
              src-tauri/*|docs/client-backend/*)
                echo "client-backend"
                ;;
              src-server/*|docs/server/*)
                echo "server"
                ;;
              src-test/*|docs/test/*)
                echo "test"
                ;;
              src/*|docs/frontend/*)
                echo "frontend"
                ;;
              history/*|report/*|.github/*|README.md|.gitignore|*.gitkeep)
                echo "meta"
                ;;
              *)
                echo "uncategorized"
                ;;
            esac
          }

          all_commits=$(git rev-list --reverse $BASE_SHA..$HEAD_SHA)
          failed=false

          for commit in $all_commits; do
            commit_msg=$(git log -1 --format=%s $commit)
            echo ""
            echo "--------------------------------------------------"
            echo "检查提交: $commit"
            echo "提交信息: $commit_msg"

            changed_files=$(git diff-tree --no-commit-id --name-only -r $commit)

            scopes=""
            for file in $changed_files; do
              scope=$(detect_scope "$file")
              if [ "$scope" != "meta" ] && [ "$scope" != "uncategorized" ]; then
                if [[ ! " $scopes " =~ " $scope " ]]; then
                  scopes="$scopes $scope"
                fi
              fi
            done

            scopes=$(echo "$scopes" | xargs)
            scope_count=$(echo "$scopes" | wc -w)

            if [ $scope_count -eq 0 ]; then
              echo "✅ 只有元数据变更，跳过职能检查"
            elif [ $scope_count -gt 1 ]; then
              echo "❌ 错误: 此提交包含多个职能的变更！"
              echo "涉及的职能:"
              for scope in $scopes; do
                echo "  - $scope"
              done
              failed=true
            else
              echo "✅ 职能范围检查通过: $scopes"
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "❌ 存在包含多个职能的提交，请拆分后重试"
            exit 1
          fi

          echo ""
          echo "✅ 所有提交均通过职能范围隔离检查"

  check-history-requirement:
    name: Check History Documentation Per Commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check History File
        shell: bash
        run: |
          echo "🔍 检查每个提交的 History 文档要求..."

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            BASE_SHA=$(git rev-parse origin/${{ github.base_ref }})
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
            BRANCH="${{ github.ref_name }}"
          fi

          current_time=$(date -u +%s)
          twenty_four_hours_ago=$((current_time - 24 * 3600))

          all_commits=$(git rev-list --reverse $BASE_SHA..$HEAD_SHA)
          failed=false

          for commit in $all_commits; do
            commit_msg=$(git log -1 --format=%s $commit)
            echo ""
            echo "--------------------------------------------------"
            echo "检查提交: $commit"
            echo "提交信息: $commit_msg"

            changed_files=$(git diff-tree --no-commit-id --name-only -r $commit)

            # 检查是否只有 meta 文件变更
            has_code_changes=false
            for file in $changed_files; do
              if [[ ! "$file" =~ ^(history/|report/|.github/|README\.md|.gitignore|.*\.gitkeep)$ ]]; then
                has_code_changes=true
                break
              fi
            done

            if [ "$has_code_changes" = false ]; then
              echo "✅ 只有元数据变更，跳过 history 检查"
              continue
            fi

            # 检查该 commit 是否变更了 history/$BRANCH/ 下的文件
            history_files=$(echo "$changed_files" | grep "^history/$BRANCH/" || true)

            if [ -z "$history_files" ]; then
              echo "❌ 错误: 此代码提交未检测到 history/$BRANCH/ 目录下的文件变更"
              echo "变更文件:"
              echo "$changed_files"
              failed=true
              continue
            fi

            echo "检测到的 history 文件:"
            echo "$history_files"

            # 检查 history 文件名格式和 commit 时间
            has_recent_file=false
            for file in $history_files; do
              filename=$(basename "$file")

              if [[ "$filename" =~ ^([0-9]{4})-([0-9]{2})-([0-9]{2})_([0-9]{2})([0-9]{2}) ]]; then
                file_commit_time=$(git log --format=%ct -n 1 -- "$file" 2>/dev/null || echo "0")

                if [ "$file_commit_time" != "0" ] && [ "$file_commit_time" -ge "$twenty_four_hours_ago" ]; then
                  echo "✅ 找到近期文件: $filename (commit时间: $(date -u -d @$file_commit_time '+%Y-%m-%d %H:%M') UTC)"
                  has_recent_file=true
                else
                  echo "⚠️ 文件 commit 时间较旧: $filename ($(date -u -d @$file_commit_time '+%Y-%m-%d %H:%M') UTC)"
                fi
              else
                echo "⚠️ 文件名格式不匹配: $filename"
              fi
            done

            if [ "$has_recent_file" = false ]; then
              echo "❌ 错误: 未找到 24 小时内创建的 history 文件"
              failed=true
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "❌ 部分提交未通过 history 文档检查"
            exit 1
          fi

          echo ""
          echo "✅ 所有提交均通过 history 文档检查"
