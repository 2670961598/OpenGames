# Web游戏平台安全基础设施 Docker Compose 配置
# 包含所有安全相关服务的部署配置

version: '3.8'

services:
  # ============================================
  # 1. API Gateway with WAF
  # ============================================
  api-gateway:
    image: kong:3.5
    container_name: game-platform-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled,rate-limiting,cors,jwt,acl,prometheus
      KONG_RATE_LIMITING_POLICY: redis
      KONG_RATE_LIMITING_REDIS_HOST: redis
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./kong-config:/kong/declarative:ro
    networks:
      - game-platform-network
    depends_on:
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================
  # 2. Firecracker MicroVM Manager
  # ============================================
  firecracker-manager:
    build:
      context: ./firecracker
      dockerfile: Dockerfile
    container_name: game-sandbox-manager
    privileged: true  # Required for KVM
    volumes:
      - /dev/kvm:/dev/kvm
      - firecracker-images:/var/lib/firecracker/images
      - firecracker-sockets:/var/run/firecracker
    environment:
      FC_SOCKET_PATH: /var/run/firecracker
      FC_KERNEL_PATH: /var/lib/firecracker/images/vmlinux-5.10
      FC_ROOTFS_PATH: /var/lib/firecracker/images/rootfs.ext4
      FC_DEFAULT_VCPU: "1"
      FC_DEFAULT_MEM: "256"
      FC_MAX_VMS: "100"
      FC_VM_TIMEOUT: "300"
    networks:
      - game-platform-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # 3. Redis for Rate Limiting & Session
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: game-platform-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
    volumes:
      - redis-data:/data
    networks:
      - game-platform-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.core.somaxconn=65535
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # 4. HashiCorp Vault for Secret Management
  # ============================================
  vault:
    image: hashicorp/vault:1.15
    container_name: game-platform-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://vault:8200
      VAULT_LOCAL_CONFIG: |
        {
          "backend": {
            "file": {
              "path": "/vault/file"
            }
          },
          "listener": {
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": true
            }
          },
          "ui": true,
          "default_lease_ttl": "168h",
          "max_lease_ttl": "720h",
          "api_addr": "http://vault:8200"
        }
    volumes:
      - vault-data:/vault/file
      - ./vault-config:/vault/config:ro
    ports:
      - "8200:8200"
    networks:
      - game-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # 5. Elasticsearch for Audit Logs
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: game-platform-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - game-platform-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ============================================
  # 6. Kibana for Log Visualization
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: game-platform-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - xpack.security.enabled=true
    ports:
      - "5601:5601"
    networks:
      - game-platform-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # ============================================
  # 7. Content Moderation Service
  # ============================================
  content-moderation:
    build:
      context: ./content-moderation
      dockerfile: Dockerfile
    container_name: game-content-moderation
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ML_MODEL_PATH=/models
      - MODERATION_THRESHOLD=0.7
      - MAX_FILE_SIZE=10485760
      - ALLOWED_IMAGE_TYPES=jpg,jpeg,png,gif,webp
      - ALLOWED_AUDIO_TYPES=mp3,wav,ogg
    volumes:
      - moderation-models:/models
      - ./moderation-config:/app/config:ro
    networks:
      - game-platform-network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ============================================
  # 8. Anti-Cheat Service
  # ============================================
  anti-cheat:
    build:
      context: ./anti-cheat
      dockerfile: Dockerfile
    container_name: game-anti-cheat
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ML_MODEL_PATH=/models
      - SCORE_VALIDATION_ENABLED=true
      - BEHAVIOR_ANALYSIS_ENABLED=true
      - SUSPICIOUS_THRESHOLD=0.8
    volumes:
      - anti-cheat-models:/models
    networks:
      - game-platform-network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # 9. Prometheus for Metrics
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48
    container_name: game-platform-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus-config:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - game-platform-network
    restart: unless-stopped

  # ============================================
  # 10. Grafana for Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:10.2
    container_name: game-platform-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ANGULAR_SUPPORT_ENABLED=false
      - GF_SECURITY_CSRF_ADDITIONAL_HEADERS=X-Forwarded-Host
      - GF_SECURITY_CSRF_TRUSTED_ORIGINS=${GRAFANA_DOMAIN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - game-platform-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ============================================
  # 11. Falco for Runtime Security
  # ============================================
  falco:
    image: falcosecurity/falco:0.36
    container_name: game-platform-falco
    privileged: true
    environment:
      - FALCO_BPF_PROBE=
      - FALCO_GRPC_ENABLED=true
      - FALCO_JSON_OUTPUT=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev:/dev
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - ./falco-rules:/etc/falco/rules.d:ro
    networks:
      - game-platform-network
    restart: unless-stopped

  # ============================================
  # 12. Alert Manager
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.26
    container_name: game-platform-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager-config:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - game-platform-network
    restart: unless-stopped

networks:
  game-platform-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
  vault-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  firecracker-images:
  firecracker-sockets:
  moderation-models:
  anti-cheat-models:
